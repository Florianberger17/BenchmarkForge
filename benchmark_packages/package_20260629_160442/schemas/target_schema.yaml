schema_id: TARGET_ERP_CUSTOMER_V1

name: Target ERP Customer Schema

domain: ERP Customer Master Data

entity: Customer

version: 1.0

attributes:

  - name: CustomerID
    type: string
    required: true
    unique: true

  - name: Name
    type: string
    required: true

  - name: Street
    type: string
    required: false

  - name: City
    type: string
    required: false

  - name: PostalCode
    type: string
    required: false

  - name: Country
    type: string
    required: true
    format: ISO-3166 alpha-3

  - name: Email
    type: string
    required: false

  - name: LastBusinessActivityDate
    type: date
    required: true

  - name: Status
    type: string
    required: true
    allowed_values:
      - active
      - inactive

constraints:

  - id: CON-001
    description: CustomerID must be unique

  - id: CON-002
    description: Name must not be empty

  - id: CON-003
    description: Country must follow ISO 3166 alpha-3 format

  - id: CON-004
    description: Status must be active or inactive

  - id: CON-005
    description: Active customers must have LastBusinessActivityDate

used_by:

  - Schema Mapping
  - Data Validation
  - Ground Truth Generation
  - Evaluation
