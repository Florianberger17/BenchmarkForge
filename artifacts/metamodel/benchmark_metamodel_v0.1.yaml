metamodel_version: "0.1"

entities:

  Scenario:
    description: >
      Defines the business context and benchmark use case.

    attributes:
      id: string
      name: string
      domain: string
      description: string

  Schema:
    description: >
      Defines the structure of source and target business objects.

    attributes:
      id: string
      type:
        - source
        - target
      fields:
        - name: string
          datatype: string
          required: boolean

  CleanDataset:
    description: >
      Noise-free synthetic reference dataset representing factual truth.

    attributes:
      id: string
      schema_id: string
      record_count: integer
      format:
        - csv
        - xml
        - json

  NoiseProfile:
    description: >
      Defines controlled data quality degradations.

    attributes:
      id: string
      noise_types:
        - type:
            - typo
            - missing_value
            - duplicate
            - outdated_information
          probability: float
          fields: list

  BenchmarkDataset:
    description: >
      Benchmark input dataset generated from a clean dataset.

    attributes:
      id: string
      source_dataset_id: string
      noise_profile_id: string
      record_count: integer
      format:
        - csv
        - xml
        - json

  BusinessRule:
    description: >
      Domain-specific migration and transformation logic.

    attributes:
      id: string
      name: string
      description: string
      rule_type:
        - migration
        - filtering
        - matching
        - validation

  Task:
    description: >
      Benchmark task executed within a scenario.

    attributes:
      id: string
      scenario_id: string
      task_type: string
      input_dataset_id: string
      instructions: string

  GroundTruth:
    description: >
      Expected correct solution generated from clean data and business rules.

    attributes:
      id: string
      task_id: string
      source_dataset_id: string
      applied_rule_ids: list
      expected_output_format:
        - csv
        - xml
        - json
        - txt

relationships:

  - from: Scenario
    to: Task
    type: contains

  - from: Schema
    to: CleanDataset
    type: structures

  - from: CleanDataset
    to: NoiseProfile
    type: transformed_by

  - from: NoiseProfile
    to: BenchmarkDataset
    type: generates

  - from: Task
    to: BenchmarkDataset
    type: uses

  - from: Task
    to: BusinessRule
    type: governed_by

  - from: CleanDataset
    to: BusinessRule
    type: processed_by

  - from: BusinessRule
    to: GroundTruth
    type: generates

  - from: Task
    to: GroundTruth
    type: has
